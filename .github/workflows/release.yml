name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release + SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo
          coverage: none

      - name: Install runtime dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: package-tools.cdx.json
          upload-artifact: false
          upload-release-assets: false   # the release step below attaches the SBOM (avoids a duplicate asset)

      - name: Extract this version's CHANGELOG section
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md)
          {
            echo "body<<__CHANGELOG_EOF__"
            if [ -n "$notes" ]; then printf '%s\n' "$notes"; else
              echo "See [CHANGELOG.md](https://github.com/laranail/package-tools/blob/main/CHANGELOG.md)."
            fi
            echo
            echo "Full history: [CHANGELOG.md](https://github.com/laranail/package-tools/blob/main/CHANGELOG.md)."
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          body: ${{ steps.changelog.outputs.body }}
          files: package-tools.cdx.json
