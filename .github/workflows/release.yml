name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release + SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo
          coverage: none

      - name: Install runtime dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: package-tools.cdx.json
          upload-artifact: false
          upload-release-assets: false   # the release step below attaches the SBOM (avoids a duplicate asset)

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/laranail/package-tools/blob/main/CHANGELOG.md) for details.
          files: package-tools.cdx.json
